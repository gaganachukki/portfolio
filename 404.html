<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - Stackly Portfolio</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/404.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.css" rel="stylesheet">
</head>
<body>

    <div class="error-page">
        <div class="auth-bg">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="grid-overlay"></div>
        </div>

        <div class="container text-center position-relative z-1">
            <div class="error-content reveal-up">
                <div class="error-code">404</div>
                <h1 class="mb-3">Page Not Found</h1>
                <p class="text-muted mb-4">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
                
                <div class="d-flex justify-content-center gap-3">
                    <button onclick="window.history.back()" class="btn btn-outline"><i class="ri-arrow-left-line"></i> Back</button>
                    <a href="index.html" class="btn btn-primary"><i class="ri-home-4-line"></i> Back To Home</a>
                </div>
            </div>

            <!-- Floating code icons -->
            <div class="floating-icons">
                <i class="ri-code-line float-icon f-1"></i>
                <i class="ri-html5-line float-icon f-2"></i>
                <i class="ri-css3-line float-icon f-3"></i>
                <i class="ri-javascript-line float-icon f-4"></i>
            </div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/animation.js"></script>
</body>
</html>
